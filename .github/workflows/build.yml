name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            artifact: klab-blockmatching-linux-x86_64
            openmp: ON
          - os: macos-latest
            name: macos-arm64
            artifact: klab-blockmatching-macos-arm64
            openmp: ON
          - os: macos-latest
            name: macos-x86_64
            artifact: klab-blockmatching-macos-x86_64
            openmp: OFF
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS' && matrix.openmp == 'ON'
        run: brew install libomp

      - name: Configure vendored NIfTI
        if: runner.os == 'Linux'
        run: |
          cmake -S external/NIFTICLIB/nifticlib-2.0.0 \
            -B build-nifti \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build vendored NIfTI
        if: runner.os == 'Linux'
        run: cmake --build build-nifti --target znz niftiio --parallel

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -Dvt_USE_OPENMP=${{ matrix.openmp }} \
            ${{ runner.os == 'Linux' && format('-DNIFTI_DIR={0}/build-nifti', github.workspace) || '' }} \
            ${{ matrix.cmake_extra }} \
            2>&1 | tee configure.log
        env:
          LDFLAGS: ${{ runner.os == 'macOS' && matrix.openmp == 'ON' && '-L/opt/homebrew/opt/libomp/lib' || '' }}
          CPPFLAGS: ${{ runner.os == 'macOS' && matrix.openmp == 'ON' && '-I/opt/homebrew/opt/libomp/include' || '' }}

      - name: Verify NIfTI was found
        if: runner.os == 'Linux'
        shell: bash
        run: |
          grep -q -- "-- nifti was found" configure.log
          ! grep -q -- "nifti was NOT found" configure.log

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Smoke test NIfTI I/O
        if: runner.os == 'Linux'
        run: |
          input=src/blockmatching/documentation/use-examples/data/irm2D-1.hdr
          output="${RUNNER_TEMP}/generated-from-analyze.nii.gz"
          build/bin/test-libio "$input" "$output"
          test -f "$output"
          build/bin/test-libio "$output"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release tarballs
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            tar czf "${name}.tar.gz" -C "$name" .
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
