name: Docs preview

on:
  pull_request:
    branches: [master]

permissions:
  statuses: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build docs
        run: uv run --with zensical zensical build --clean

      - name: Deploy to Smokeshow
        id: smokeshow
        run: |
          uv run --with smokeshow smokeshow upload site/ 2>&1 | tee /tmp/smokeshow.log
          url=$(grep -oP 'https://[a-z0-9-]+\.smokeshow\.helpmanual\.io' /tmp/smokeshow.log | head -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          SMOKESHOW_AUTH_KEY: ${{ secrets.SMOKESHOW_AUTH_KEY }}
          SMOKESHOW_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKESHOW_GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.smokeshow.outputs.url }}';
            const body = `📄 **Docs preview:** ${url}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Docs preview:')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
